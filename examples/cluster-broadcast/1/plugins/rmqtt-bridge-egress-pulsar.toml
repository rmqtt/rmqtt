##--------------------------------------------------------------------
## rmqtt-bridge-egress-pulsar
##--------------------------------------------------------------------

# See more keys and their definitions at https://github.com/rmqtt/rmqtt/blob/master/docs/en_US/bridge-egress-pulsar.md

[[bridges]]
# Whether to enable
enable = true
# Bridge name
name = "bridge_pulsar_1"

# Pulsar service URL
servers = "pulsar://127.0.0.1:6650"
# client.id
client_id_prefix = "pulsar_egress_001"

# Maximum limit of clients connected to the remote Pulsar broker
concurrent_client_limit = 3

[bridges.properties]
"message.timeout.ms" = "5000"

[[bridges.entries]]
#Local topic filter: All messages matching this topic filter will be forwarded.
local.topic_filter = "local/topic/egress/pulsar/#"

remote.topic = "remote-topic-egress-pulsar-${local.topic}"
#remote.queue_timeout = "0m"

[[bridges.entries]]
local.topic_filter = "local/topic/egress/pulsar/specific"

remote.topic = "remote-topic-egress-pulsar-specific"
