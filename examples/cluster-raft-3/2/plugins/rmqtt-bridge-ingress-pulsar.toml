##--------------------------------------------------------------------
## rmqtt-bridge-ingress-pulsar
##--------------------------------------------------------------------

# See more keys and their definitions at https://github.com/rmqtt/rmqtt/blob/master/docs/en_US/bridge-ingress-pulsar.md

[[bridges]]
# Whether to enable
enable = true
# Bridge name
name = "bridge_pulsar_ingress_1"

# Pulsar service URL
servers = "pulsar://127.0.0.1:6650"
# client.id
client_id_prefix = "pulsar_ingress_001"

# Maximum limit of clients
concurrent_client_limit = 3

[bridges.properties]
"message.timeout.ms" = "5000"

[[bridges.entries]]
#Remote topic filter
remote.topic = "remote-topic-ingress-pulsar"
#remote.group_id = "group_id_001"
#remote.start_partition = -1
#remote.stop_partition = -1
#remote.offset = "beginning"

local.topic = "local/topic/ingress/pulsar/${remote.topic}"
#local.retain = true

[[bridges.entries]]
remote.topic = "remote-topic-ingress-pulsar-specific"

local.topic = "local/topic/ingress/pulsar/specific"
